<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sandwich Station 14 - Home</title>
    <style>
        :root {
            --color-section-bg: #212126;
            --color-panel-bg: #16161a;
            --color-server-entry-bg: #1f1f29;
            --color-text: #c8c8c8;
            --color-text-muted: #9c9c9c;
            --color-link: #96aaff;
            --color-link-hover: #d3d3d3;
            --color-heading: #e0e0e0;
            --color-border: #525252;
            --color-warning-yellow: #ffc107;
            --color-warning-bg: #3d3a20;
        }
        
        body {
            background: #25252a;
            color: var(--color-text);
            font-family: 'Roboto', sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .container {
            max-width: 800px;
            margin: 60px auto;
            padding: 40px;
            background-color: var(--color-panel-bg);
            border-radius: 0;
            box-shadow: none;
            flex: 1;
        }
        
        h1 {
            font-family: 'Montserrat', sans-serif;
            color: var(--color-heading);
            margin-top: 0;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--color-border);
            font-size: 2.5rem;
            text-align: center;
        }
        
        .subtitle {
            text-align: center;
            color: var(--color-text-muted);
            font-style: italic;
            margin-bottom: 40px;
            font-size: 1.1em;
        }
        
        .nav-section {
            margin: 30px 0;
        }
        
        .nav-section h3 {
            color: var(--color-heading);
            margin-top: 0;
            font-size: 1.3rem;
            border-left: 3px solid var(--color-link);
            padding-left: 15px;
        }
        
        .nav-list {
            list-style: none;
            padding: 0;
            margin: 15px 0;
        }
        
        .nav-list li {
            margin: 10px 0;
        }
        
        .nav-list a {
            color: var(--color-link);
            text-decoration: none;
            padding: 12px 20px;
            display: block;
            background-color: var(--color-section-bg);
            border-left: 3px solid transparent;
            transition: all 0.2s ease;
        }
        
        .nav-list a:hover {
            background-color: var(--color-server-entry-bg);
            border-left: 3px solid var(--color-link);
            color: var(--color-link-hover);
            text-decoration: none;
        }
        
        .nav-list a::before {
            content: "→ ";
            opacity: 0;
            transition: opacity 0.2s ease;
        }
        
        .nav-list a:hover::before {
            opacity: 1;
        }
        
        .info-box {
            background-color: var(--color-section-bg);
            border-left: 4px solid var(--color-link);
            padding: 15px;
            margin: 20px 0;
            font-size: 0.95em;
        }
        
        hr {
            min-height: 2px;
            margin: 30px 0;
            height: 1px;
            border: 0;
            background: var(--color-border);
        }
        
        .footer-links {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid var(--color-border);
        }
        
        .footer-links a {
            margin: 0 15px;
            font-size: 0.9em;
        }
        
        @media (max-width: 576px) {
            .container {
                padding: 20px;
                margin: 20px auto;
            }
            
            h1 {
                font-size: 1.8rem;
            }
            
            .footer-links a {
                display: block;
                margin: 10px 0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Sandwich Station 14</h1>
        <p class="subtitle">Building communities, one sandwich at a time</p>
        
        <div class="info-box">
            Welcome to the official Sandwich Station site. Browse our documentation and resources below.
        </div>
        
        <div class="nav-section">
            <h3>Documentation</h3>
            <ul class="nav-list">
                <li><a href="privacypolicy.html">Privacy Policy</a></li>
            </ul>
        </div>
        
        <div class="nav-section">
            <h3>Community</h3>
            <ul class="nav-list">
                <li><a href="https://discord.sandwich14.com">Join Our Discord</a></li>
            </ul>
        </div>
        
        <hr>
        
        <div class="footer-links">
            <a href="mailto:fax@sandwichstation.com">Contact us by email</a> | 
            <a href="https://discord.sandwich14.com">Our discord server</a>
        </div>
    </div>
</body>
</html>
